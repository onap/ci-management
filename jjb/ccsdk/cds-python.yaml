---
- project:
    name: ccsdk-cds-py-executor
    project: ccsdk/cds
    project-name: ccsdk-cds-py-executor
    mvn-settings: ccsdk-cds-settings
    build-node: ubuntu1804-docker-8c-8g
    python-version: python3
    tox-dir: ms/py-executor
    tox-envs: py38
    gerrit_trigger_file_paths:
      - compare-type: REG_EXP
        pattern: "ms/py-executor/.*"
    stream:
      - master:
          branch: master
      - quebec:
          branch: quebec
      - paris:
          branch: paris
    jobs:
      - gerrit-tox-verify

- project:
    name: ccsdk-cds-e2e-playwright
    project-name: ccsdk-cds
    project: ccsdk/cds
    build-node: ubuntu2204-docker-8c-8g
    build-timeout: 30
    pattern: "cds-ui/**"
    area: e2e-playwright
    script: !include-raw-escape: cds-playwright-e2e.sh
    stream:
      - master:
          branch: master
      - quebec:
          branch: quebec
    jobs:
      - "{project-name}-{stream}-{area}-verify-shell"

- project:
    name: ccsdk-cds-artifact-manager
    project: ccsdk/cds
    project-name: ccsdk-cds-artifact-manager
    mvn-settings: ccsdk-cds-settings
    build-node: ubuntu1804-docker-8c-8g
    python-version: python3
    tox-dir: ms/artifact-manager
    tox-envs: py38
    gerrit_trigger_file_paths:
      - compare-type: REG_EXP
        pattern: "ms/artifact-manager/.*"
    stream:
      - master:
          branch: master
      - quebec:
          branch: quebec
      - paris:
          branch: paris
    jobs:
      - gerrit-tox-verify
