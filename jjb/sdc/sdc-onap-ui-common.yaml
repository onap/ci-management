---
# The verify and merge pipelines for this repository have migrated to
# GitHub Actions (see .github/workflows/gerrit-verify.yaml and
# gerrit-merge.yaml in sdc/onap-ui-common). The Jenkins verify-java and
# merge-java jobs are therefore removed as duplicates; merge-java was also
# failing because it attempted a Maven `deploy` of this JS/SCSS library to
# the Nexus releases repo (401 Unauthorized). The SonarCloud job is retained
# until equivalent scanning is added to the GitHub Actions workflows.
- project:
    name: sdc-onap-ui-common-sonar
    jobs:
      - gerrit-maven-sonar
    sonarcloud: true
    sonarcloud-project-organization: "{sonarcloud_project_organization}"
    sonarcloud-project-key: "{sonarcloud_project_organization}_{project-name}"
    sonar-mvn-goal: "{sonar_mvn_goal}"
    java-version: openjdk11
    build-node: ubuntu2204-builder-4c-4g
    project: "sdc/onap-ui-common"
    project-name: "sdc-onap-ui-common"
    branch: "master"
    mvn-settings: "sdc-onap-ui-common-settings"
    mvn-params: "-Dsonar.branch={branch}"
    mvn-goals: "clean install"
    mvn-opts: "-Xmx1024m"
